name: Bug Report
description: Report a reproducible problem in a plugin or skill.
title: "bug: "
labels:
  - bug
body:
  - type: input
    id: area
    attributes:
      label: Affected plugin or skill
      placeholder: mnemex-core / macos-automation / dev-tools
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps and commands.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Redact personal data before posting.

